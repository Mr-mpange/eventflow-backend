services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eventflow
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: eventflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - eventflow

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - eventflow

  api:
    build:
      context: .
      target: production
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://eventflow:${DB_PASSWORD}@postgres:5432/eventflow?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      APP_URL: ${APP_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      GHALA_RAILS_API_KEY: ${GHALA_RAILS_API_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    depends_on:
      - postgres
      - redis
    networks:
      - eventflow
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 512M

  worker:
    build:
      context: .
      target: worker
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://eventflow:${DB_PASSWORD}@postgres:5432/eventflow?schema=public
      REDIS_URL: redis://redis:6379
      GHALA_RAILS_API_KEY: ${GHALA_RAILS_API_KEY}
    depends_on:
      - postgres
      - redis
    networks:
      - eventflow
    deploy:
      replicas: 1

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - api
    networks:
      - eventflow

volumes:
  postgres_data:
  redis_data:

networks:
  eventflow:
    driver: bridge
