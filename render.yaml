services:
  - type: web
    name: eventflow-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npx prisma db push
    startCommand: node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: API_VERSION
        value: v1
      - key: DATABASE_URL
        fromDatabase:
          name: eventflow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: eventflow-redis
          type: redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CSRF_SECRET
        generateValue: true

databases:
  - name: eventflow-db
    plan: free

  - name: eventflow-redis
    plan: free
    ipAllowList: []
